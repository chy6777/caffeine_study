server:
  port: 8080

spring:
  # ---- H2 内存数据库（零配置，学习专用） ----
  datasource:
    url: jdbc:h2:mem:caffeinedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  # ---- Redis 配置（第三阶段需要） ----
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ---- 自定义配置 ----
app:
  cache:
    # 启动时是否自动预热（第二阶段功能）
    warmup-on-startup: false
  bloom-filter:
    expected-insertions: 10000
    fpp: 0.01

logging:
  level:
    com.example.caffeine: INFO